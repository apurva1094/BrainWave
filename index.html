<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainWave AI | Universal Student Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a; 
            color: #f1f5f9;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
        }
        .search-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .result-card {
            background: #1e293b;
            border-left: 4px solid #38bdf8;
            transition: transform 0.3s ease;
        }
        .quiz-section {
            border-left: 4px solid #a855f7;
            background: rgba(168, 85, 247, 0.05);
        }
        .notes-section {
            border-left: 4px solid #10b981;
            background: rgba(16, 185, 129, 0.05);
        }
        .brain-gradient {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-extrabold brain-gradient">BrainWave AI</h1>
                <p class="text-slate-500 text-xs mt-1 font-mono tracking-widest uppercase">Universal Learning Engine v2.0</p>
            </div>
            <div class="hidden md:block bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700">
                <span class="w-2 h-2 bg-green-500 rounded-full inline-block mr-2 animate-pulse"></span>
                <span class="text-[10px] text-slate-400 font-mono uppercase">AI Core Online</span>
            </div>
        </header>

        <div class="search-container p-6 md:p-8 rounded-[2rem] shadow-2xl mb-10">
            <h2 class="text-sm font-semibold text-slate-400 mb-4 uppercase tracking-tighter">What are we learning today?</h2>
            <div class="relative">
                <textarea id="userInput" 
                    class="w-full h-32 bg-slate-900/50 border border-slate-700 rounded-2xl p-5 text-lg focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all resize-none text-white"
                    placeholder="Describe any topic, ask a doubt, or paste a complex concept..."></textarea>
                
                <button onclick="askBrainWave()" 
                    class="absolute bottom-4 right-4 bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold px-6 py-2 rounded-xl transition-all shadow-lg hover:shadow-sky-500/20">
                    LEARN NOW
                </button>
            </div>
            <div class="mt-4 flex flex-wrap gap-2">
                <span class="text-[10px] text-slate-500">Try:</span>
                <button onclick="document.getElementById('userInput').value='Explain Quantum Physics'; askBrainWave()" class="text-[10px] bg-slate-800 px-2 py-1 rounded border border-slate-700 hover:text-sky-400">Quantum Physics</button>
                <button onclick="document.getElementById('userInput').value='How do black holes work?'; askBrainWave()" class="text-[10px] bg-slate-800 px-2 py-1 rounded border border-slate-700 hover:text-sky-400">Black Holes</button>
                <button onclick="document.getElementById('userInput').value='Python Loops for beginners'; askBrainWave()" class="text-[10px] bg-slate-800 px-2 py-1 rounded border border-slate-700 hover:text-sky-400">Python Loops</button>
            </div>
        </div>

        <div id="responseContainer" class="space-y-6 hidden">
            <div class="result-card p-6 rounded-2xl shadow-lg">
                <h3 class="text-sky-400 font-bold text-xs uppercase mb-3 flex items-center gap-2">
                    <span class="p-1 bg-sky-500/10 rounded">📘</span> Concept Explanation
                </h3>
                <div id="explanationOutput" class="text-slate-300 leading-relaxed whitespace-pre-wrap"></div>
            </div>

            <div class="notes-section p-6 rounded-2xl shadow-lg">
                <h3 class="text-emerald-400 font-bold text-xs uppercase mb-3 flex items-center gap-2">
                    <span class="p-1 bg-emerald-500/10 rounded">📝</span> Key Study Notes
                </h3>
                <div id="notesOutput" class="text-slate-300 space-y-2 whitespace-pre-wrap"></div>
            </div>

            <div class="quiz-section p-6 rounded-2xl shadow-lg">
                <h3 class="text-purple-400 font-bold text-xs uppercase mb-3 flex items-center gap-2">
                    <span class="p-1 bg-purple-500/10 rounded">🧠</span> Knowledge Check (Quiz)
                </h3>
                <div id="quizOutput" class="text-slate-300 whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
